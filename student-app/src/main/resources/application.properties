spring.application.name=SpringKeycloak

spring.datasource.url=jdbc:postgresql://localhost:5432/university
spring.datasource.username=postgres
# spring.datasource.password is supplied via JVM arg: -Dspring.datasource.password=yourpassword

spring.jpa.hibernate.ddl-auto=validate

# --- Keycloak OAuth2/OIDC client (shared realm with professor-app for SSO) ---
spring.security.oauth2.client.registration.keycloak.client-id=student-app-client
spring.security.oauth2.client.registration.keycloak.client-secret=student-app-secret
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8081/realms/university-realm
