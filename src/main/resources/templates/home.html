<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .profile-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 380px;
            padding: 40px 32px;
            text-align: center;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            margin: 0 auto 16px;
        }

        .profile-card h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 4px;
        }

        .profile-card p.subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .details {
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 14px;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-row .label {
            color: #888;
            font-weight: 600;
        }

        .detail-row .value {
            color: #333;
            font-weight: 500;
            text-align: right;
        }

        .btn-logout {
            display: inline-block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
            text-align: center;
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        .btn-logout:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="avatar" th:text="${#strings.substring(user.firstName,0,1)}">U</div>
        <h1 th:text="${user.firstName + ' ' + (user.lastName != null ? user.lastName : '')}">Full Name</h1>
        <p class="subtitle">Welcome back!</p>

        <div class="details">
            <div class="detail-row">
                <span class="label">Username</span>
                <span class="value" th:text="${user.username}">username</span>
            </div>
            <div class="detail-row">
                <span class="label">Email</span>
                <span class="value" th:text="${user.email}">email@example.com</span>
            </div>
            <div class="detail-row">
                <span class="label">First Name</span>
                <span class="value" th:text="${user.firstName}">First</span>
            </div>
            <div class="detail-row">
                <span class="label">Last Name</span>
                <span class="value" th:text="${user.lastName}">Last</span>
            </div>
        </div>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn-logout">Logout</button>
        </form>
    </div>
</body>
</html>
