spring.application.name=professor-app

# Use a port distinct from student-app (8080) and Keycloak (typically 8080/8081)
server.port=8082

# --- Datasource (same "university" DB / user & roles tables as student-app) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/university
spring.datasource.username=postgres
# spring.datasource.password is supplied via JVM arg: -Dspring.datasource.password=yourpassword

spring.jpa.hibernate.ddl-auto=validate

# --- Keycloak OAuth2/OIDC client (PLACEHOLDERS - configure in Keycloak admin console) ---
## Redirect URI to register in Keycloak client: http://localhost:8082/login/oauth2/code/keycloak
spring.security.oauth2.client.registration.keycloak.client-id=professor-app-client
spring.security.oauth2.client.registration.keycloak.client-secret=professor-app-secret
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Replace host/port/realm with your Keycloak instance, e.g. http://localhost:8081/realms/university-realm
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8081/realms/university-realm
