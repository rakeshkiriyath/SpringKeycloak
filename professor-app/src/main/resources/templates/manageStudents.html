<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 32px;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 24px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-weight: 600;
        }

        th:first-child {
            border-top-left-radius: 8px;
        }

        th:last-child {
            border-top-right-radius: 8px;
        }

        tbody tr:nth-child(even) {
            background: #f9f9fb;
        }

        tbody tr:hover {
            background: #f0eefc;
        }

        td {
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit, .btn-delete {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }

        .btn-edit {
            background: #eef0ff;
            color: #4c51bf;
        }

        .btn-edit:hover {
            background: #dde1ff;
        }

        .btn-delete {
            background: #fdecea;
            color: #c0392b;
        }

        .btn-delete:hover {
            background: #fbd5d2;
        }

        .empty {
            text-align: center;
            color: #888;
            padding: 24px;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }

        .btn-logout {
            display: inline-block;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: #f5f5f5;
            color: #555;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-logout:hover {
            background: #ebebeb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </div>

        <h1>Manage Students</h1>

        <table th:if="${not #lists.isEmpty(students)}">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Username</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="student : ${students}">
                    <td th:text="${student.firstName + ' ' + (student.lastName != null ? student.lastName : '')}">Name</td>
                    <td th:text="${student.email}">email@example.com</td>
                    <td th:text="${student.username}">username</td>
                    <td class="actions">
                        <a class="btn-edit" th:href="@{/updateStudent/{id}(id=${student.id})}">Edit</a>
                        <form th:action="@{/deleteStudent/{id}(id=${student.id})}" method="post"
                              onsubmit="return confirm('Delete this student?');">
                            <button type="submit" class="btn-delete">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <p class="empty" th:if="${#lists.isEmpty(students)}">No students found.</p>
    </div>
</body>
</html>
